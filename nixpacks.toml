[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "npm install"
]

[phases.build]
cmds = [
    "echo '=== Building React Frontend ==='",
    "npx vite build",
    "echo '=== Frontend build complete ==='"
]

[start]
cmd = "python start.py"
