[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "npm install"
]

[phases.build]
cmds = [
    "echo '=== Cleaning old build ==='",
    "rm -rf dist",
    "echo '=== Building React Frontend v2 ==='",
    "npx vite build",
    "ls -la dist/assets/",
    "echo '=== Frontend build complete ==='"
]

[start]
cmd = "python start.py"
